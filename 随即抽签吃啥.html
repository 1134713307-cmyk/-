<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            height: 250px;
            width: 500px;
            border: 1px solid black;
           
        }

        .tile {
            font-weight: 800;
            font-size: 15px;
            display: flex;
            justify-content: center;
            font-size: 30px;
            margin-top: 5px;
            margin-bottom: 40px;
        }
        .question {
            display: flex;
            font-size: 30px;
            margin-left: 40px;
        }

        .check {
            display: flex;
            justify-content: space-evenly;
            margin-top: 30px;
        }

        button:hover {
            background-color: #929292;
        }

        .start {
            height: 30px;
            width:60px;
        }

        .over {
            height: 30px;
            width:60px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="tile">今天吃啥</div>
        <div class="question">吾日三省吾身:麻辣烫</div>
        <div class="check">
            <button class="start">开始</button>
            <button class="over">结束</button>
        </div>
    </div>
    <script>
        let num = 0
        let food = ['水煮肉片','螺蛳粉','自选菜','麻辣烫','牛肉面','干锅鸡盖饭','青椒肉丝','鸡公煲','串串','花雕醉鸡']
        const qs = document.querySelector('.question')
        const start = document.querySelector('.start')
        const over = document.querySelector('.over')
        let time = 0
        start.addEventListener('click',function() {
                time =setInterval(function() {
                const random = parseInt(Math.random() * food.length)
                food[random]
                qs.innerHTML=`吾日三省吾身:${food[random]}`
            },35)
        })
        over.addEventListener('click',function() {
            clearInterval(time)
        })

    </script>
</body>
</html>
